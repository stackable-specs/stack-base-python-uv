# compose.yaml - Production configuration
# Reference: docs/specs/delivery/docker-compose.md

name: stack-base-python-uv

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: stack-base-python-uv:latest  # Tag for build output
    restart: unless-stopped
    user: "10001:10001"
    environment:
      - PYTHONUNBUFFERED=1
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"